name: Nightly Current Week Features (Week Posters + Favorite Team)

on:
  schedule:
    - cron: "25 6 * * *" # 6:25 UTC (~1:25am ET)
  workflow_dispatch:

jobs:
  generate_current_week_features:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts (Pillow / Matplotlib text)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate + Upload Current Week Features
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          PYTHONPATH: .
        run: |
          python -m app.scripts.nightly_publish_current_week --keep_versioned
          python -m app.scripts.nightly_publish_current_favorite_team --keep_versioned
