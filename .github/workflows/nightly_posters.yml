name: Nightly Posters (Standings + Leaders + Team Needs + Stat of the Day + Matchups + Draft + Schedules + Rosters)

on:
  schedule:
    - cron: "15 6 * * *" # 6:15 UTC (~1:15am ET)
  workflow_dispatch:

jobs:
  generate_posters:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts (Pillow text)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate + Upload Posters
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          PYTHONPATH: .
        run: |
          python -m app.scripts.nightly_publish_posters --season 2025 --seasontypes "2,3" --keep_versioned
          python -m app.scripts.nightly_publish_team_needs --keep_versioned
          python -m app.scripts.stat_of_the_day_publish --keep_versioned
          python -m app.scripts.nightly_publish_league_matchups --keep_versioned
          python -m app.scripts.nightly_publish_pff_big_board --keep_versioned
          python -m app.scripts.nightly_publish_tankathon_mock --keep_versioned
          python -m app.scripts.nightly_publish_team_schedules --keep_versioned
          python -m app.scripts.nightly_publish_team_rosters --keep_versioned
